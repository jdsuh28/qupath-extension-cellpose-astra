# Optional ASTRA hook configuration for qupath-extension-cellpose
#
# Place this file at:
#   src/main/resources/astra/astra.properties
#
# If this file is absent, AstraHooks.java will use its hardcoded defaults.
# The values below mirror the intended ASTRA defaults.

enabled=true
skipModelMove=true
skipAutomaticQc=true
allowLegacyTrainingResultsSave=false

# Training directory behavior:
# - flat   -> use groundTruthDirectory directly
# - nested -> use groundTruthDirectory/train
trainingDirMode=flat

# Relative path to the QC script inside the installed extension resources.
qcScriptRelativePath=astra/qc/run-cellpose-qc.py

# Relative results directory under the QuPath project directory.
resultsRelativePath=results
